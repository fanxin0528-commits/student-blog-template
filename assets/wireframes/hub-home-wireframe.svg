  <text x="754" y="178" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Similar members</text>
  <circle cx="770" cy="218" r="15" fill="#ffffff" stroke="#d1d5db"/>
  <text x="796" y="222" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Alex</text>
  <circle cx="770" cy="278" r="15" fill="#ffffff" stroke="#d1d5db"/>
  <text x="796" y="282" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#111827">Mina</text>
