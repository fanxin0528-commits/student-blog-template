<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Recovery Hub structured log wireframe</title>
  <desc id="desc">Structured recovery log wireframe showing pain level captured through logs.</desc>
  <rect width="920" height="560" fill="#ffffff"/>
  <rect x="1" y="1" width="918" height="558" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <rect x="0" y="0" width="920" height="56" fill="#ffffff" stroke="#d1d5db"/>
  <text x="28" y="35" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Recovery Hub</text>
  <text x="146" y="35" font-family="Inter, Arial, sans-serif" font-size="13" fill="#374151">Community</text>
  <rect x="452" y="18" width="56" height="22" rx="11" fill="#1f2937"/>
  <text x="469" y="33" font-family="Inter, Arial, sans-serif" font-size="10" fill="#ffffff">Logs</text>
  <text x="28" y="96" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Create comparable recovery experience posts</text>
  <text x="28" y="122" font-family="Inter, Arial, sans-serif" font-size="13" fill="#6b7280">Pain level is captured through logs instead of being manually maintained in My Account.</text>
  <rect x="28" y="150" width="590" height="360" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="50" y="190" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Create a structured recovery log</text>
  <text x="50" y="218" font-family="Inter, Arial, sans-serif" font-size="13" fill="#374151">Fields make posts comparable across stages.</text>
  <g fill="#ffffff" stroke="#d1d5db">
    <rect x="50" y="254" width="160" height="34" rx="4"/>
    <rect x="232" y="254" width="160" height="34" rx="4"/>
    <rect x="414" y="254" width="160" height="34" rx="4"/>
    <rect x="50" y="324" width="160" height="34" rx="4"/>
    <rect x="232" y="324" width="160" height="34" rx="4"/>
    <rect x="414" y="324" width="160" height="34" rx="4"/>
    <rect x="50" y="394" width="250" height="62" rx="4"/>
    <rect x="324" y="394" width="250" height="62" rx="4"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="12" fill="#6b7280">
    <text x="50" y="244">Date</text>
    <text x="232" y="244">Stage</text>
    <text x="414" y="244">Visibility</text>
    <text x="50" y="314">Pain before</text>
    <text x="232" y="314">Pain after</text>
    <text x="414" y="314">Confidence</text>
    <text x="50" y="384">Movement tried</text>
    <text x="324" y="384">Symptoms and limits</text>
  </g>
  <text x="62" y="276" font-family="Inter, Arial, sans-serif" font-size="12" fill="#374151">30 Apr 2026</text>
  <text x="244" y="276" font-family="Inter, Arial, sans-serif" font-size="12" fill="#374151">Stage 2</text>
  <text x="426" y="276" font-family="Inter, Arial, sans-serif" font-size="12" fill="#374151">Hub members</text>
  <text x="62" y="346" font-family="Inter, Arial, sans-serif" font-size="12" fill="#374151">2 / 10</text>
  <text x="244" y="346" font-family="Inter, Arial, sans-serif" font-size="12" fill="#374151">3 / 10</text>
  <text x="426" y="346" font-family="Inter, Arial, sans-serif" font-size="12" fill="#374151">Medium</text>
  <rect x="448" y="468" width="126" height="32" rx="4" fill="#1f2937"/>
  <text x="478" y="488" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#ffffff">Publish log</text>
  <rect x="644" y="150" width="248" height="360" rx="6" fill="#ffffff" stroke="#d1d5db"/>
  <text x="666" y="190" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Post preview</text>
  <rect x="666" y="220" width="204" height="112" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="684" y="248" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Fanxin's recovery log</text>
  <text x="684" y="276" font-family="Inter, Arial, sans-serif" font-size="12" fill="#374151">Knee / Stage 2 / return to running</text>
  <text x="684" y="300" font-family="Inter, Arial, sans-serif" font-size="12" fill="#374151">Pain before 2, after 3</text>
  <rect x="666" y="374" width="204" height="78" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="684" y="404" font-family="Inter, Arial, sans-serif" font-size="12" fill="#374151">Logs become the source of changing recovery-state data.</text>
</svg>
