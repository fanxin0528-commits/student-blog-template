  <text x="44" y="84" font-family="Inter, Arial, sans-serif" font-size="14" fill="#4b5563">Stage-based community flow, desktop screens, and mobile companion screens.</text>
  <rect x="44" y="112" width="540" height="120" rx="8" fill="#ffffff" stroke="#d1d5db"/>
  <text x="68" y="144" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#111827">User Flow</text>
