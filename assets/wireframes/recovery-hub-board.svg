<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Recovery Hub wireframe board overview</title>
  <desc id="desc">Overview of desktop and mobile wireframes for the Recovery Hub community concept.</desc>
  <rect width="1200" height="720" fill="#f3f4f6"/>
